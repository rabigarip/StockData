name: Refresh GCC MarketScreener snapshots

# Scrapes the MarketScreener /finances/ (+ other) pages for the 60 GCC names
# from GitHub's residential-class runners (MarketScreener Cloudflare-blocks
# datacenter IPs), and commits the HTML snapshots into THIS repo's
# data/marketscreener/. The daily sheet refresh then reads those snapshots —
# no live scraping needed anywhere else.

on:
  workflow_dispatch:        # run on demand
  schedule:
    - cron: '0 6 * * 1'     # weekly, Monday 06:00 UTC

permissions:
  contents: write           # to commit refreshed snapshots

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # If final_earnings is private, set SUBMODULE_TOKEN (a PAT with read
          # access) in repo secrets; otherwise github.token covers a public submodule.
          token: ${{ secrets.SUBMODULE_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install engine dependencies
        run: pip install -r final_earnings/requirements.txt

      - name: Scrape MS snapshots (self-contained, no DB)
        env:
          MS_TRACKED_REFRESH: '1'
          MS_USE_CURL_CFFI: '1'
          ENGINE_ROOT: ${{ github.workspace }}/final_earnings
        run: python refresh_snapshots.py
        
      # No copy step: refresh_snapshots.py places ONLY verified names' lean files
      # into data/marketscreener/ (and clears stale ones first).

      - name: Commit refreshed snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/marketscreener
          git commit -m "Refresh GCC MarketScreener snapshots [skip ci]" || { echo "no changes"; exit 0; }
          # Rebase onto any commits that landed during the ~6-min run, then push.
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push origin "HEAD:${{ github.ref_name }}"
